<style>
:root{--bg:#08080c;--sf:#101018;--sf2:#16161f;--acc:#be123c;--acc2:#fda4af;--grn:#34d399;--grn2:rgba(34,197,94,.08);--amb:#fbbf24;--amb2:rgba(251,191,36,.08);--ros:#fb7185;--ros2:rgba(251,113,133,.06);--cyn:#22d3ee;--txt:#dfdfe5;--dim:#8888a0;--mut:#555568;--bd:#1e1e2a;--bd2:#2a2a3a}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--txt);font-family:'Noto Serif SC','Source Serif 4','STIX Two Text',Georgia,serif;line-height:1.75}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.5}
.back{position:fixed;top:16px;left:16px;z-index:100;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--dim);text-decoration:none;padding:6px 14px;border:1px solid var(--bd2);border-radius:8px;background:rgba(16,16,24,.85);backdrop-filter:blur(8px);transition:.2s}.back:hover{color:var(--acc2);border-color:var(--acc)}
.hero{padding:80px 24px 40px;text-align:center;border-bottom:1px solid var(--bd)}.hero .tag{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--acc2);margin-bottom:12px}.hero h1{font-family:'Source Serif 4',serif;font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:700;margin-bottom:8px}.hero p{color:var(--dim);font-size:.92rem;max-width:520px;margin:0 auto}
.wrap{max-width:820px;margin:0 auto;padding:24px 20px 80px}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:11px 16px;margin:28px 0 12px;font-weight:700;color:var(--acc2);font-size:.95rem}
.qc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:10px;transition:.3s}
.qn{font-size:.72rem;color:var(--mut);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.df{font-size:.62rem;padding:1px 6px;border-radius:3px;font-weight:700}
.de{background:var(--grn2);color:var(--grn)}.dm{background:var(--amb2);color:var(--amb)}.dh{background:var(--ros2);color:var(--ros)}
.qt{font-size:.92rem;margin-bottom:10px}
.opts label{display:block;margin:3px 0;padding:8px 12px;border-radius:6px;background:rgba(14,14,22,.7);border:1px solid var(--bd);cursor:pointer;transition:.2s;font-size:.88rem}
.opts label:hover{border-color:var(--acc);background:rgba(190,18,60,.06)}
.opts input{margin-right:8px;accent-color:var(--acc)}
.qc.ok{border-color:var(--grn);background:var(--grn2)}.qc.no{border-color:var(--ros);background:var(--ros2)}.qc.un{border-color:var(--amb)}
.bc{text-align:center;margin:30px 0}
.btn{padding:14px 40px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}.btn:hover{filter:brightness(1.15)}
.btn2{padding:10px 24px;background:transparent;color:var(--acc2);border:1px solid var(--acc);border-radius:8px;font-size:.88rem;cursor:pointer;font-family:inherit;margin-left:10px}
.rp{display:none;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:28px;margin-top:28px}
.sb{text-align:center;font-size:2.6rem;font-weight:800;margin-bottom:4px}.sc{text-align:center;color:var(--dim);margin-bottom:16px;font-size:.95rem}
.stb{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}.stc{padding:5px 12px;border-radius:6px;font-size:.78rem;font-weight:600;background:var(--sf2);border:1px solid var(--bd)}
.mi{border-left:3px solid var(--ros);background:var(--ros2);border-radius:8px;padding:14px 18px;margin-bottom:12px}
.mi .ep{margin-top:8px;padding:10px;background:rgba(0,0,0,.25);border-radius:6px;border:1px dashed var(--bd2);color:var(--dim);font-size:.86rem;line-height:1.65}
.footer{text-align:center;padding:24px;border-top:1px solid var(--bd);font-size:.72rem;color:var(--mut);font-family:'IBM Plex Mono',monospace}
@media(max-width:600px){.wrap{padding:16px 12px 60px}.hero{padding:60px 14px 30px}}
</style>

<body>
<a class="back" href="index.html">← 返回主页</a>
<div class="hero"><div class="tag">Exercices · Analyse</div><h1>分析综合测验</h1><p>40 题 · 基础→中级→高级 · 积分技巧 + 反常积分</p></div>
<div class="wrap">
<div id="qbox"></div>
<div class="bc">
<button class="btn" onclick="submit()">交卷并查看解析</button>
<button class="btn2" onclick="reset()">重置</button>
</div>
<div class="rp" id="rp"></div>
</div>
<div class="footer">MC2 Quiz · Analyse</div>

<script>
const Q=[
// ── 基础：原函数 ──
{s:"基础 · 原函数计算"},
{q:"\\(\\int x^3 e^x dx\\) 需要几次分部积分？",o:["1次","2次","3次","4次"],a:2,d:0,e:"\\(u=x^3\\)，每次 IPP 降一阶：\\(x^3\\to x^2\\to x\\to 1\\)，共 3 次。"},
{q:"\\(\\int \\frac{dx}{x^2+4}\\) 等于？",o:["\\(\\frac{1}{2}\\arctan\\frac{x}{2}+C\\)","\\(\\arctan\\frac{x}{2}+C\\)","\\(\\frac{1}{4}\\arctan\\frac{x}{2}+C\\)","\\(\\ln(x^2+4)+C\\)"],a:0,d:0,e:"公式 \\(\\int\\frac{dx}{x^2+a^2}=\\frac{1}{a}\\arctan\\frac{x}{a}+C\\)，\\(a=2\\)。"},
{q:"\\(\\int \\ln x\\,dx\\) 的结果是？",o:["\\(x\\ln x+C\\)","\\(x\\ln x-x+C\\)","\\(\\frac{\\ln^2x}{2}+C\\)","\\(\\frac{1}{x}+C\\)"],a:1,d:0,e:"IPP：\\(u=\\ln x,\\,dv=dx\\)。\\(=x\\ln x-\\int 1\\,dx=x\\ln x-x+C\\)。"},
{q:"\\(\\int_0^{\\pi/2}\\sin^3 t\\,dt\\) 的值？",o:["\\(\\pi/4\\)","\\(2/3\\)","\\(1/3\\)","\\(4/3\\)"],a:1,d:0,e:"\\(\\sin^3t=\\sin t(1-\\cos^2t)\\)，令 \\(u=\\cos t\\)，得 \\(1-1/3=2/3\\)。"},
{q:"\\(\\int\\frac{2x+3}{x^2+3x+5}dx\\) 等于？",o:["\\(\\ln|x^2+3x+5|+C\\)","\\(\\arctan(x)+C\\)","\\(\\frac{1}{x^2+3x+5}+C\\)","需要分解"],a:0,d:0,e:"分子恰为分母导数 → 直接 \\(\\ln\\) 型。"},

// ── 中级：技巧 ──
{s:"中级 · 积分技巧"},
{q:"\\(\\int\\frac{t^5}{1+t^{12}}dt\\) 最佳换元？",o:["\\(u=t^3\\)","\\(u=t^6\\)","\\(u=t^{12}\\)","\\(u=1+t^{12}\\)"],a:1,d:1,e:"\\(u=t^6\\implies du=6t^5dt\\)，化为 \\(\\frac{1}{6}\\int\\frac{du}{1+u^2}=\\frac{1}{6}\\arctan(t^6)+C\\)。"},
{q:"\\(\\int\\frac{1}{\\sqrt{5+4t-t^2}}dt\\) 第一步？",o:["分部积分","三角代换","配方","万能代换"],a:2,d:1,e:"\\(5+4t-t^2=9-(t-2)^2\\)，然后 \\(t-2=3\\sin\\theta\\)。"},
{q:"有理分式 \\(\\frac{t}{(t-1)(t^2+1)}\\) 中 \\(t^2+1\\) 项的分子形式？",o:["常数","\\(Bt+C\\)","\\(B/t\\)","\\(Bt^2+C\\)"],a:1,d:1,e:"不可约二次因子对应一次分子 \\(Bt+C\\)。"},
{q:"Riemann 和 \\(\\frac{1}{n}\\sum_{k=1}^n\\sin\\frac{k\\pi}{n}\\) 的极限？",o:["\\(\\pi\\)","\\(2/\\pi\\)","\\(2\\)","\\(1\\)"],a:1,d:1,e:"\\(=\\int_0^1\\sin(\\pi x)dx=2/\\pi\\)。注意 \\(f(x)=\\sin(\\pi x)\\)，不是 \\(\\sin x\\)。"},
{q:"\\(S_n=\\sum_{k=1}^{2n}\\frac{k}{n^2+k^2}\\) 的极限？",o:["\\(\\ln 2/2\\)","\\(\\ln 5/2\\)","\\(\\ln 3\\)","\\(\\pi/4\\)"],a:1,d:1,e:"上限 \\(2n\\) → 区间 \\([0,2]\\)。\\(\\int_0^2\\frac{x}{1+x^2}dx=\\frac{\\ln 5}{2}\\)。"},

// ── 中级：反常积分基础 ──
{s:"中级 · 反常积分敛散性"},
{q:"\\(\\int_1^{+\\infty}\\frac{1}{x^{1.001}}dx\\)",o:["收敛","发散"],a:0,d:0,e:"\\(p=1.001>1\\)，收敛。"},
{q:"\\(\\int_0^1\\frac{1}{x^{0.999}}dx\\)（瑕点 0）",o:["收敛","发散"],a:0,d:0,e:"瑕积分 \\(p=0.999<1\\)，收敛。"},
{q:"\\(\\int_0^1\\frac{dx}{x}\\)",o:["收敛","发散"],a:1,d:0,e:"瑕积分 \\(p=1\\)，临界发散。"},
{q:"\\(\\int_1^{+\\infty}\\frac{x^3}{x^5+2}dx\\)",o:["收敛","发散"],a:0,d:0,e:"\\(\\sim 1/x^2\\)，\\(p=2>1\\)。"},
{q:"\\(\\int_1^{+\\infty}\\frac{x^3}{x^4+2}dx\\)",o:["收敛","发散"],a:1,d:0,e:"\\(\\sim 1/x\\)，\\(p=1\\)，发散。"},
{q:"\\(\\int_2^{+\\infty}\\frac{1}{x\\ln x}dx\\)",o:["收敛","发散"],a:1,d:1,e:"令 \\(u=\\ln x\\)，化为 \\(\\int du/u\\)，发散。"},
{q:"\\(\\int_2^{+\\infty}\\frac{1}{x(\\ln x)^2}dx\\)",o:["收敛","发散"],a:0,d:1,e:"令 \\(u=\\ln x\\)，化为 \\(\\int du/u^2\\)，收敛。"},
{q:"\\(\\int_1^{+\\infty}x^{100}e^{-x}dx\\)",o:["收敛","发散"],a:0,d:0,e:"指数衰减秒杀任何多项式。"},
{q:"\\(\\int_1^{+\\infty}\\frac{\\ln x}{x^2}dx\\)",o:["收敛","发散"],a:0,d:1,e:"\\(\\lim\\frac{\\ln x/x^2}{1/x^{1.5}}=\\lim\\frac{\\ln x}{\\sqrt{x}}=0\\)，\\(g\\) 收敛→原式收敛。"},
{q:"\\(\\int_0^1\\frac{e^x-1}{x^{1.5}}dx\\)（瑕点 0）",o:["收敛","发散"],a:0,d:1,e:"\\(e^x-1\\sim x\\)，整体 \\(\\sim 1/x^{0.5}\\)，\\(p=0.5<1\\)。"},
{q:"\\(\\int_0^1\\frac{\\cos x}{x}dx\\)（瑕点 0）",o:["收敛","发散"],a:1,d:1,e:"\\(\\cos 0=1\\)，\\(\\sim 1/x\\)，\\(p=1\\)，发散。"},
{q:"\\(\\int_1^{+\\infty}\\frac{\\sqrt{x+1}}{x^2}dx\\)",o:["收敛","发散"],a:0,d:1,e:"\\(\\sim x^{0.5}/x^2=1/x^{1.5}\\)，\\(p=1.5>1\\)。"},
{q:"\\(\\int_1^{+\\infty}e^{-x^2}dx\\)",o:["收敛","发散"],a:0,d:0,e:"高斯积分，\\(e^{-x^2}\\le e^{-x}\\) 对 \\(x\\ge 1\\)。"},
{q:"\\(\\int_0^1\\frac{1}{\\sqrt{1-x}}dx\\)",o:["收敛","发散"],a:0,d:0,e:"瑕点在 1。令 \\(u=1-x\\)，\\(\\sim 1/u^{0.5}\\)，\\(p=0.5<1\\)。"},

// ── 高级：条件收敛 ──
{s:"高级 · 条件收敛与综合"},
{q:"\\(\\int_1^{+\\infty}\\frac{\\sin x}{x}dx\\)",o:["绝对收敛","条件收敛","发散"],a:1,d:2,e:"Dirichlet 证收敛。加绝对值后 \\(\\ge\\sin^2x/x\\) 中 \\(1/2x\\) 发散 → 非绝对收敛。"},
{q:"\\(\\int_1^{+\\infty}\\frac{\\cos x}{x^3}dx\\)",o:["绝对收敛","条件收敛","发散"],a:0,d:1,e:"\\(|\\cos x/x^3|\\le 1/x^3\\)，\\(p=3>1\\)。"},
{q:"\\(\\int_1^{+\\infty}\\frac{\\sin^2 x}{x}dx\\)",o:["收敛","发散"],a:1,d:2,e:"\\(\\sin^2x=\\frac{1-\\cos 2x}{2}\\)。\\(\\int 1/2x\\) 发散，\\(\\int\\cos 2x/2x\\) 收敛，总体发散。"},
{q:"\\(\\int_1^{+\\infty}\\sin(x^2)dx\\)",o:["绝对收敛","条件收敛","发散"],a:1,d:2,e:"Fresnel 积分。\\(t=x^2\\) 后用 Dirichlet。非绝对收敛。"},
{q:"Dirichlet 判别法对振荡部分 \\(f\\) 要求什么？",o:["\\(f\\) 有界","\\(f\\to 0\\)","\\(\\int_1^A f\\,dx\\) 有界","\\(f\\) 单调"],a:2,d:2,e:"要求积分有界，不是函数有界！"},
{q:"Abel 判别法要求乘子 \\(g\\) 满足？",o:["单调且→0","单调且有界","积分有界","连续且正"],a:1,d:2,e:"Abel：已收敛积分 × 单调有界乘子 → 仍收敛。"},
{q:"\\(\\int_0^{+\\infty}\\frac{1}{x^p+x^q}dx\\)（\\(0<p<1<q\\)）",o:["收敛","发散"],a:0,d:2,e:"拆分。0 附近 \\(\\sim 1/x^p\\)，\\(p<1\\) 收敛。\\(\\infty\\) 处 \\(\\sim 1/x^q\\)，\\(q>1\\) 收敛。"},
{q:"\\(\\int_0^{\\pi/2}\\tan x\\,dx\\)",o:["收敛","发散"],a:1,d:1,e:"瑕点 \\(\\pi/2\\)。\\(\\tan x\\sim\\frac{1}{\\pi/2-x}\\)，\\(p=1\\)，发散。"},
{q:"\\(\\int_0^1\\frac{1}{x-\\sin x}dx\\)（瑕点 0）",o:["收敛","发散"],a:1,d:2,e:"Taylor：\\(x-\\sin x\\sim x^3/6\\)，故 \\(\\sim 6/x^3\\)，\\(p=3\\ge 1\\)，发散。"},
{q:"\\(\\int_2^{+\\infty}\\frac{\\sin x}{\\ln x}dx\\)",o:["绝对收敛","条件收敛","发散"],a:1,d:2,e:"Dirichlet 证收敛（\\(1/\\ln x\\) 单调→0）。加绝对值发散 → 条件收敛。"},

// ── 高级：含参 ──
{s:"高级 · 含参积分"},
{q:"\\(\\int_1^{+\\infty}\\frac{\\ln t}{t^a}dt\\) 收敛条件？",o:["\\(a>0\\)","\\(a>1\\)","\\(a\\ge 1\\)","\\(a>2\\)"],a:1,d:2,e:"\\(\\ln t\\le t^\\varepsilon\\) → \\(a-\\varepsilon>1\\) 需 \\(a>1\\)。\\(a=1\\) 时 \\((\\ln t)^2/2\\to\\infty\\)。"},
{q:"\\(\\int_0^1\\frac{\\ln t}{t^a}dt\\) 收敛条件？",o:["\\(a<1\\)","\\(a<2\\)","\\(a\\le 1\\)","\\(a>0\\)"],a:0,d:2,e:"换元 \\(t=1/u\\) 化为 \\(\\int_1^\\infty\\frac{\\ln u}{u^{2-a}}du\\)，需 \\(2-a>1\\) 即 \\(a<1\\)。"},
{q:"\\(\\int_0^{+\\infty}\\frac{t^a}{1+t^2}dt\\) 收敛当且仅当？",o:["\\(-1<a<1\\)","\\(a>-1\\)","\\(a<1\\)","\\(0<a<2\\)"],a:0,d:2,e:"0 附近 \\(\\sim t^a\\)，需 \\(a>-1\\)。\\(\\infty\\) 处 \\(\\sim t^{a-2}\\)，需 \\(a<1\\)。"},
{q:"\\(\\int_0^{+\\infty}\\frac{\\arctan t}{1+t^2}dt\\) 的值？",o:["\\(\\pi^2/8\\)","\\(\\pi/4\\)","\\(\\pi^2/4\\)","\\(\\ln 2\\)"],a:0,d:1,e:"原函数 \\(\\frac{1}{2}(\\arctan t)^2\\)。\\(\\lim=\\frac{1}{2}(\\pi/2)^2=\\pi^2/8\\)。"},
];

let qIdx=0;
const box=document.getElementById('qbox');
let html='';
Q.forEach(item=>{
  if(item.s){html+=`<div class="sec">${item.s}</div>`;return;}
  const dc=['de','dm','dh'][item.d],dl=['基础','中级','高级'][item.d];
  let oh='';item.o.forEach((o,i)=>{oh+=`<label><input type="radio" name="q${qIdx}" value="${i}"> ${o}</label>`;});
  html+=`<div class="qc" id="c${qIdx}"><div class="qn">第 ${qIdx+1} 题 <span class="df ${dc}">${dl}</span></div><div class="qt">${item.q}</div><div class="opts">${oh}</div></div>`;
  item._i=qIdx++;
});
box.innerHTML=html;
MathJax.typesetPromise();

function submit(){
  let sc=0,tot=0,un=0,mis=[];
  let by=[{c:0,t:0},{c:0,t:0},{c:0,t:0}];
  Q.forEach(item=>{
    if(item.s)return;tot++;by[item.d].t++;
    const el=document.querySelector(`input[name="q${item._i}"]:checked`);
    const cd=document.getElementById(`c${item._i}`);
    cd.classList.remove('ok','no','un');
    if(!el){un++;cd.classList.add('un');}
    else if(+el.value===item.a){sc++;by[item.d].c++;cd.classList.add('ok');}
    else{cd.classList.add('no');mis.push({i:item._i,q:item.q,y:item.o[+el.value],c:item.o[item.a],e:item.e,d:item.d});}
  });
  if(un>0&&!confirm(`还有 ${un} 题未作答，确定交卷？`))return;
  let pct=Math.round(sc/tot*100);
  let col=pct>=80?'var(--grn)':pct>=60?'var(--amb)':'var(--ros)';
  let cmt=pct>=90?'出色！基础和进阶都很扎实。':pct>=70?'不错，查漏补缺看错题解析。':pct>=50?'底子可以但进阶部分有盲区，仔细看解析。':'需要重点回顾基础概念，特别是 p-判别法和等价无穷小。';
  let mh='';mis.forEach(m=>{
    const dl=['基础','中级','高级'][m.d];
    mh+=`<div class="mi"><div style="font-weight:700;margin-bottom:6px">❌ 第 ${m.i+1} 题 <span class="df ${['de','dm','dh'][m.d]}">${dl}</span></div><div class="qt">${m.q}</div><div style="font-size:.85rem;margin-top:6px"><span style="color:var(--mut);text-decoration:line-through">你的答案：${m.y}</span><br><strong style="color:var(--grn)">正确答案：${m.c}</strong></div><div class="ep">${m.e}</div></div>`;
  });
  document.getElementById('rp').style.display='block';
  document.getElementById('rp').innerHTML=`<div class="sb" style="color:${col}">${sc} / ${tot}</div><div class="sc">${cmt}</div><div class="stb"><div class="stc" style="color:var(--grn)">基础 ${by[0].c}/${by[0].t}</div><div class="stc" style="color:var(--amb)">中级 ${by[1].c}/${by[1].t}</div><div class="stc" style="color:var(--ros)">高级 ${by[2].c}/${by[2].t}</div></div>${mis.length?'<h3 style="color:var(--ros);margin-bottom:14px">错题详解</h3>'+mh:'<p style="text-align:center;color:var(--grn);font-size:1.1rem;font-weight:700">🎉 全对！</p>'}`;
  MathJax.typesetPromise();
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}
function reset(){
  document.querySelectorAll('input[type=radio]').forEach(r=>r.checked=false);
  document.querySelectorAll('.qc').forEach(c=>c.classList.remove('ok','no','un'));
  document.getElementById('rp').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body></html>
